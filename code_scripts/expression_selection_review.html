<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>表达选择人工评分</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #d8dee8;
      --text: #17202a;
      --muted: #647184;
      --brand: #176b87;
      --brand-soft: #e4f2f6;
      --warn: #8a5a00;
      --warn-soft: #fff3d1;
      --good: #1d7a46;
      --good-soft: #e1f4e8;
      --bad: #a33b35;
      --bad-soft: #f9e4e1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 6px;
      padding: 7px 10px;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 14px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .main {
      padding: 18px;
      overflow: auto;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 12px;
    }

    .toolbar {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .toolbar-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .file-input {
      width: 100%;
      padding: 8px;
      border: 1px dashed var(--line);
      border-radius: 6px;
      background: #fbfcfd;
    }

    .dataset-meta {
      color: var(--muted);
      font-size: 12px;
      word-break: break-all;
    }

    .sample-list {
      display: grid;
      gap: 6px;
    }

    .sample-button {
      display: grid;
      gap: 3px;
      width: 100%;
      text-align: left;
      padding: 9px;
      border-radius: 6px;
    }

    .sample-button.active {
      border-color: var(--brand);
      background: var(--brand-soft);
    }

    .sample-title {
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sample-subtitle {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .score-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--line);
      display: inline-block;
    }

    .score-dot.done {
      background: var(--good);
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .sample-header {
      display: grid;
      gap: 8px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .meta-item {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      background: #fbfcfd;
    }

    .meta-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 3px;
    }

    .meta-value {
      word-break: break-word;
    }

    .history {
      white-space: pre-wrap;
      color: var(--muted);
      max-height: 180px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      background: #fbfcfd;
    }

    .method-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(260px, 1fr));
      gap: 12px;
      align-items: start;
    }

    .method {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .method-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }

    .method-name {
      font-weight: 700;
    }

    .blind-method-name {
      font-weight: 700;
    }

    .badge {
      display: none;
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 12px;
      color: var(--muted);
      background: #eef1f5;
    }

    .method-body {
      display: grid;
      gap: 5px;
      padding: 8px;
    }

    .expression {
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 5px 7px;
      background: #fff;
    }

    .expression-id {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 2px;
    }

    .expression-text {
      margin-bottom: 1px;
      font-size: 13px;
    }

    .expression-style {
      color: var(--brand);
      font-size: 13px;
    }

    .expression-score {
      color: var(--muted);
      font-size: 12px;
    }

    .empty {
      color: var(--muted);
      padding: 10px;
      border: 1px dashed var(--line);
      border-radius: 6px;
    }

    .winner-button {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 6px;
      padding: 6px 10px;
      min-width: 36px;
    }

    .winner-button.active {
      border-color: var(--brand);
      background: var(--brand-soft);
      color: var(--brand);
      font-weight: 700;
    }

    .winner-button:hover {
      border-color: var(--brand);
    }

    .winner-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .winner-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .query {
      white-space: pre-wrap;
      max-height: 260px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: #fbfcfd;
      color: var(--muted);
    }

    .notice {
      border: 1px solid var(--warn);
      background: var(--warn-soft);
      color: var(--warn);
      border-radius: 8px;
      padding: 12px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .summary .meta-value {
      font-size: 20px;
      font-weight: 700;
    }

    @media (max-width: 1080px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .method-grid,
      .meta-grid,
      .summary {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 class="title">表达选择评分</h1>
      <div class="toolbar">
        <input id="datasetFile" class="file-input" type="file" accept=".json,application/json">
        <div class="toolbar-row">
          <button id="exportButton" class="primary" disabled>导出评分</button>
          <button id="importButton" disabled>导入评分</button>
          <input id="ratingsFile" type="file" accept=".json,application/json" hidden>
        </div>
        <div class="toolbar-row">
          <button id="prevButton" disabled>上一条</button>
          <button id="nextButton" disabled>下一条</button>
        </div>
        <label class="toolbar-row">
          <input id="onlyUnscored" type="checkbox">
          只看未完成
        </label>
        <input id="searchInput" class="file-input" type="search" placeholder="搜索目标消息或回复">
        <div id="datasetMeta" class="dataset-meta">请选择批量对比 JSON。</div>
      </div>
      <div id="sampleList" class="sample-list"></div>
    </aside>

    <main class="main">
      <div id="emptyState" class="notice">先选择 `expression_selection_batch_compare_*.json`，再开始人工评分。</div>
      <div id="content" hidden>
        <section class="section">
          <div class="summary">
            <div class="meta-item">
              <div class="meta-label">样本数</div>
              <div id="summarySamples" class="meta-value">0</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">已完成</div>
              <div id="summaryDone" class="meta-value">0</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">平均分最高</div>
              <div id="summaryBest" class="meta-value">-</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">胜出最多</div>
              <div id="summaryWinner" class="meta-value">-</div>
            </div>
          </div>
        </section>

        <section class="section sample-header">
          <h2 id="sampleTitle" class="title"></h2>
          <div class="meta-grid">
            <div class="meta-item">
              <div class="meta-label">目标消息</div>
              <div id="targetText" class="meta-value"></div>
            </div>
            <div class="meta-item">
              <div class="meta-label">实际回复</div>
              <div id="actualReply" class="meta-value"></div>
            </div>
            <div class="meta-item">
              <div class="meta-label">会话 / 消息</div>
              <div id="messageMeta" class="meta-value"></div>
            </div>
          </div>
          <div>
            <div class="meta-label">Planner Query</div>
            <div id="queryText" class="query"></div>
          </div>
          <div>
            <div class="meta-label">最近上下文</div>
            <div id="historyBlock" class="history"></div>
          </div>
        </section>

        <section class="section">
          <div class="winner-row">
            <strong>本样本整体胜出：</strong>
            <div id="winnerButtons" class="winner-actions">
              <button class="winner-button" data-winner-value="old_direct">方案</button>
              <button class="winner-button" data-winner-value="precise_selection">方案</button>
              <button class="winner-button" data-winner-value="vector_recall">方案</button>
              <button class="winner-button" data-winner-value="tie">并列</button>
              <button class="winner-button" data-winner-value="none">都不合适</button>
            </div>
            <button id="saveButton" class="primary">保存当前评分</button>
          </div>
        </section>

        <section class="method-grid">
          <article class="method" data-method="old_direct">
            <div class="method-head">
              <div class="method-name">方案</div>
              <span id="old_directCount" class="badge">0</span>
            </div>
            <div id="old_directBody" class="method-body"></div>
          </article>
          <article class="method" data-method="precise_selection">
            <div class="method-head">
              <div class="method-name">方案</div>
              <span id="precise_selectionCount" class="badge">0</span>
            </div>
            <div id="precise_selectionBody" class="method-body"></div>
          </article>
          <article class="method" data-method="vector_recall">
            <div class="method-head">
              <div class="method-name">方案</div>
              <span id="vector_recallCount" class="badge">0</span>
            </div>
            <div id="vector_recallBody" class="method-body"></div>
          </article>
        </section>

      </div>
    </main>
  </div>

  <script>
    const methods = ["old_direct", "precise_selection", "vector_recall"];
    const blindLabels = ["方案 A", "方案 B", "方案 C"];

    let dataset = null;
    let ratings = {};
    let activeIndex = 0;

    const elements = {
      datasetFile: document.getElementById("datasetFile"),
      ratingsFile: document.getElementById("ratingsFile"),
      exportButton: document.getElementById("exportButton"),
      importButton: document.getElementById("importButton"),
      prevButton: document.getElementById("prevButton"),
      nextButton: document.getElementById("nextButton"),
      onlyUnscored: document.getElementById("onlyUnscored"),
      searchInput: document.getElementById("searchInput"),
      datasetMeta: document.getElementById("datasetMeta"),
      sampleList: document.getElementById("sampleList"),
      emptyState: document.getElementById("emptyState"),
      content: document.getElementById("content"),
      sampleTitle: document.getElementById("sampleTitle"),
      targetText: document.getElementById("targetText"),
      actualReply: document.getElementById("actualReply"),
      messageMeta: document.getElementById("messageMeta"),
      historyBlock: document.getElementById("historyBlock"),
      winnerButtons: document.getElementById("winnerButtons"),
      saveButton: document.getElementById("saveButton"),
      queryText: document.getElementById("queryText"),
      summarySamples: document.getElementById("summarySamples"),
      summaryDone: document.getElementById("summaryDone"),
      summaryBest: document.getElementById("summaryBest"),
      summaryWinner: document.getElementById("summaryWinner")
    };

    function stableHash(value) {
      let hash = 2166136261;
      const text = String(value || "");
      for (let index = 0; index < text.length; index += 1) {
        hash ^= text.charCodeAt(index);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function blindMethodOrder(sample) {
      return methods
        .map((method) => ({ method, hash: stableHash(`${sampleKey(sample)}:${method}`) }))
        .sort((left, right) => left.hash - right.hash)
        .map((item) => item.method);
    }

    function blindLabelForMethod(sample, method) {
      const order = blindMethodOrder(sample);
      const index = order.indexOf(method);
      return blindLabels[index >= 0 ? index : 0];
    }

    function datasetKey() {
      if (!dataset) {
        return "";
      }
      const seed = `${dataset.generated_at || ""}:${dataset.analysis_json || ""}:${dataset.samples?.length || 0}`;
      return `expression-selection-ratings:${seed}`;
    }

    function sampleKey(sample) {
      return sample.sample_id || `${sample.source_log}:${sample.planner_line}:${sample.target_message_id}`;
    }

    function defaultRating() {
      return {
        winner: "",
        ranking: [],
        special: "",
        methods: {
          old_direct: { note: "" },
          precise_selection: { note: "" },
          vector_recall: { note: "" }
        }
      };
    }

    function getRating(sample) {
      const key = sampleKey(sample);
      if (!ratings[key]) {
        ratings[key] = defaultRating();
      }
      for (const method of methods) {
        if (!ratings[key].methods[method]) {
          ratings[key].methods[method] = { note: "" };
        }
      }
      if (!Array.isArray(ratings[key].ranking)) {
        ratings[key].ranking = ratings[key].winner && methods.includes(ratings[key].winner)
          ? [ratings[key].winner]
          : [];
      }
      if (typeof ratings[key].special !== "string") {
        ratings[key].special = ["tie", "none"].includes(ratings[key].winner) ? ratings[key].winner : "";
      }
      return ratings[key];
    }

    function isComplete(sample) {
      const rating = getRating(sample);
      return rating.special === "tie" || rating.special === "none" || rating.ranking.length > 0;
    }

    function unrankedMethods(rating) {
      return methods.filter((method) => !rating.ranking.includes(method));
    }

    function saveRatingsToStorage() {
      const key = datasetKey();
      if (key) {
        localStorage.setItem(key, JSON.stringify(ratings));
      }
    }

    function loadRatingsFromStorage() {
      ratings = {};
      const key = datasetKey();
      if (!key) {
        return;
      }
      const raw = localStorage.getItem(key);
      if (!raw) {
        return;
      }
      try {
        ratings = JSON.parse(raw) || {};
      } catch {
        ratings = {};
      }
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error);
        reader.readAsText(file, "utf-8");
      });
    }

    function expressionItems(sample, method) {
      if (method === "vector_recall") {
        return sample.vector_recall?.matches || [];
      }
      return sample[method]?.selected_expressions || [];
    }

    function renderExpression(item, method) {
      void method;
      return `
        <div class="expression">
          <div class="expression-text">${escapeHtml(item.situation || "")}</div>
          <div class="expression-style">${escapeHtml(item.style || "")}</div>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderMethod(sample, method, blindIndex) {
      const body = document.getElementById(`${method}Body`);
      const count = document.getElementById(`${method}Count`);
      const methodCard = document.querySelector(`[data-method="${method}"]`);
      const items = expressionItems(sample, method);
      const methodTitle = methodCard?.querySelector(".method-name");
      if (methodTitle) {
        methodTitle.textContent = blindLabels[blindIndex] || "方案";
      }
      count.textContent = `${items.length}`;
      const skipped = sample[method]?.skipped;
      const itemHtml = items.length
        ? items.map((item) => renderExpression(item, method)).join("")
        : `<div class="empty">${skipped ? "已跳过" : "没有选中表达"}</div>`;
      body.innerHTML = itemHtml;
    }

    function filteredSamples() {
      if (!dataset) {
        return [];
      }
      const query = elements.searchInput.value.trim().toLowerCase();
      return dataset.samples.filter((sample) => {
        if (elements.onlyUnscored.checked && isComplete(sample)) {
          return false;
        }
        if (!query) {
          return true;
        }
        const target = sample.target_message?.text || "";
        const reply = sample.actual_reply || "";
        const guide = sample.reply_guide || "";
        return `${target} ${reply} ${guide}`.toLowerCase().includes(query);
      });
    }

    function renderSampleList() {
      const samples = filteredSamples();
      elements.sampleList.innerHTML = "";
      for (const sample of samples) {
        const realIndex = dataset.samples.indexOf(sample);
        const button = document.createElement("button");
        button.className = `sample-button${realIndex === activeIndex ? " active" : ""}`;
        button.innerHTML = `
          <span class="sample-title"><span class="score-dot ${isComplete(sample) ? "done" : ""}"></span> #${realIndex + 1} ${escapeHtml(sample.target_message?.text || sample.target_message_id)}</span>
          <span class="sample-subtitle">${escapeHtml(sample.actual_reply || "")}</span>
        `;
        button.addEventListener("click", () => {
          activeIndex = realIndex;
          render();
        });
        elements.sampleList.appendChild(button);
      }
    }

    function renderSummary() {
      const samples = dataset.samples || [];
      elements.summarySamples.textContent = String(samples.length);
      elements.summaryDone.textContent = String(samples.filter(isComplete).length);

      const winnerCounts = {};
      for (const sample of samples) {
        const rating = getRating(sample);
        if (rating.winner) {
          winnerCounts[rating.winner] = (winnerCounts[rating.winner] || 0) + 1;
        }
      }
      void winnerCounts;
      elements.summaryBest.textContent = "盲评中";
      elements.summaryWinner.textContent = "盲评中";
    }

    function renderActiveSample() {
      const sample = dataset.samples[activeIndex];
      if (!sample) {
        return;
      }
      const rating = getRating(sample);
      elements.sampleTitle.textContent = `样本 ${activeIndex + 1}`;
      elements.targetText.textContent = sample.target_message?.text || sample.target_message_id || "";
      elements.actualReply.textContent = sample.actual_reply || "";
      elements.messageMeta.textContent = `${sample.target_message?.session_id || ""} / ${sample.target_message_id || ""}`;
      elements.historyBlock.textContent = (sample.history_lines || []).join("\n") || "无可用上下文";
      elements.queryText.textContent = sample.query_text || "";
      renderWinnerButtons(rating);
      const order = blindMethodOrder(sample);
      const methodGrid = document.querySelector(".method-grid");
      for (const [index, method] of order.entries()) {
        const card = document.querySelector(`[data-method="${method}"]`);
        if (card && methodGrid) {
          methodGrid.appendChild(card);
        }
        renderMethod(sample, method, index);
      }
    }

    function renderWinnerButtons(rating) {
      const sample = dataset?.samples?.[activeIndex];
      if (sample) {
        for (const method of blindMethodOrder(sample)) {
          const methodButton = elements.winnerButtons.querySelector(`[data-winner-value="${method}"]`);
          if (methodButton) {
            elements.winnerButtons.appendChild(methodButton);
          }
        }
        for (const stableValue of ["tie", "none"]) {
          const stableButton = elements.winnerButtons.querySelector(`[data-winner-value="${stableValue}"]`);
          if (stableButton) {
            elements.winnerButtons.appendChild(stableButton);
          }
        }
      }
      elements.winnerButtons.querySelectorAll("[data-winner-value]").forEach((button) => {
        const winnerValue = button.dataset.winnerValue;
        if (sample && methods.includes(winnerValue)) {
          const rankIndex = rating.ranking.indexOf(winnerValue);
          const rankPrefix = rankIndex >= 0 ? `第 ${rankIndex + 1} · ` : "";
          button.textContent = `${rankPrefix}${blindLabelForMethod(sample, winnerValue)}`;
        }
        button.classList.toggle(
          "active",
          methods.includes(winnerValue) ? rating.ranking.includes(winnerValue) : rating.special === winnerValue,
        );
      });
    }

    function updateRanking(sample, selectedValue) {
      const rating = getRating(sample);
      if (selectedValue === "tie" || selectedValue === "none") {
        rating.special = selectedValue;
        rating.winner = selectedValue;
        rating.ranking = [];
        return rating;
      }

      rating.special = "";
      rating.winner = "";
      const existingIndex = rating.ranking.indexOf(selectedValue);
      if (existingIndex >= 0) {
        rating.ranking.splice(existingIndex, 1);
      } else if (rating.ranking.length < methods.length) {
        rating.ranking.push(selectedValue);
      }
      rating.winner = rating.ranking[0] || "";
      return rating;
    }

    function render() {
      if (!dataset) {
        elements.emptyState.hidden = false;
        elements.content.hidden = true;
        return;
      }
      elements.emptyState.hidden = true;
      elements.content.hidden = false;
      activeIndex = Math.max(0, Math.min(activeIndex, dataset.samples.length - 1));
      elements.prevButton.disabled = activeIndex <= 0;
      elements.nextButton.disabled = activeIndex >= dataset.samples.length - 1;
      elements.exportButton.disabled = false;
      elements.importButton.disabled = false;
      renderSummary();
      renderSampleList();
      renderActiveSample();
    }

    async function loadDataset(file) {
      const raw = await readFileAsText(file);
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed.samples)) {
        throw new Error("JSON 缺少 samples 列表");
      }
      dataset = parsed;
      activeIndex = 0;
      loadRatingsFromStorage();
      elements.datasetMeta.textContent = [
        `文件：${file.name}`,
        `生成：${parsed.generated_at || "-"}`,
        `样本：${parsed.samples.length}`,
        `向量：${parsed.embedding_model || "-"}`
      ].join(" | ");
      render();
    }

    function currentRatingExport() {
      const normalizedRatings = {};
      for (const sample of dataset?.samples || []) {
        const key = sampleKey(sample);
        const rating = getRating(sample);
        normalizedRatings[key] = {
          ...rating,
          unranked_methods: rating.special ? [] : unrankedMethods(rating),
          unranked_treatment: rating.special ? "" : "完全不符"
        };
      }
      return {
        exported_at: new Date().toISOString(),
        dataset: {
          generated_at: dataset?.generated_at || "",
          analysis_json: dataset?.analysis_json || "",
          sample_count: dataset?.samples?.length || 0
        },
        ratings: normalizedRatings
      };
    }

    function downloadJson(filename, payload) {
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
    }

    elements.datasetFile.addEventListener("change", async () => {
      const file = elements.datasetFile.files?.[0];
      if (!file) {
        return;
      }
      try {
        await loadDataset(file);
      } catch (error) {
        alert(`读取失败：${error.message || error}`);
      }
    });

    elements.exportButton.addEventListener("click", () => {
      if (!dataset) {
        return;
      }
      downloadJson("expression_selection_ratings.json", currentRatingExport());
    });

    elements.importButton.addEventListener("click", () => {
      elements.ratingsFile.click();
    });

    elements.ratingsFile.addEventListener("change", async () => {
      const file = elements.ratingsFile.files?.[0];
      if (!file) {
        return;
      }
      try {
        const parsed = JSON.parse(await readFileAsText(file));
        ratings = parsed.ratings || parsed || {};
        saveRatingsToStorage();
        render();
      } catch (error) {
        alert(`导入失败：${error.message || error}`);
      }
    });

    elements.prevButton.addEventListener("click", () => {
      activeIndex -= 1;
      render();
    });

    elements.nextButton.addEventListener("click", () => {
      activeIndex += 1;
      render();
    });

    elements.onlyUnscored.addEventListener("change", renderSampleList);
    elements.searchInput.addEventListener("input", renderSampleList);
    elements.winnerButtons.addEventListener("click", (event) => {
      const button = event.target.closest("[data-winner-value]");
      if (!button || !dataset) {
        return;
      }
      const sample = dataset.samples[activeIndex];
      const rating = updateRanking(sample, button.dataset.winnerValue);
      saveRatingsToStorage();
      renderWinnerButtons(rating);
      renderSummary();
      renderSampleList();
    });
    elements.saveButton.addEventListener("click", () => {
      saveRatingsToStorage();
      renderSummary();
      renderSampleList();
      const sample = dataset?.samples?.[activeIndex];
      if (sample && isComplete(sample) && activeIndex < dataset.samples.length - 1) {
        activeIndex += 1;
        render();
      }
    });
  </script>
</body>
</html>
