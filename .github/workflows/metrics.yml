name: Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/repository-metrics.svg
          template: repository
          user: Mai-with-u
          repo: MaiBot
          base: header, activity, repositories, metadata
          plugins_errors_fatal: yes
          plugin_followup: yes
